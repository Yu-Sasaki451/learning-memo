<svg xmlns="http://www.w3.org/2000/svg" width="960" height="320" viewBox="0 0 960 320" role="img" aria-labelledby="title desc">
  <title id="title">JavaScript基礎の流れ</title>
  <desc id="desc">値を変数に入れ、関数で処理し、結果を表示する流れ</desc>
  <rect width="960" height="320" fill="#f8fafc"/>
  <g fill="#ffffff" stroke="#9fb3c8" stroke-width="2">
    <rect x="50" y="90" width="180" height="120" rx="8"/>
    <rect x="280" y="90" width="180" height="120" rx="8"/>
    <rect x="510" y="90" width="180" height="120" rx="8"/>
    <rect x="740" y="90" width="170" height="120" rx="8"/>
  </g>
  <g fill="#102a43" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="140" y="132" text-anchor="middle" font-size="22" font-weight="800">値</text>
    <text x="140" y="166" text-anchor="middle" font-size="16">文字・数字・true/false</text>
    <text x="370" y="132" text-anchor="middle" font-size="22" font-weight="800">変数</text>
    <text x="370" y="166" text-anchor="middle" font-size="16">名前を付けて保存</text>
    <text x="600" y="132" text-anchor="middle" font-size="22" font-weight="800">関数</text>
    <text x="600" y="166" text-anchor="middle" font-size="16">処理をまとめる</text>
    <text x="825" y="132" text-anchor="middle" font-size="22" font-weight="800">結果</text>
    <text x="825" y="166" text-anchor="middle" font-size="16">表示・保存・通信</text>
  </g>
  <g stroke="#2f9e44" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M235 150H270"/>
    <path d="M265 140l12 10-12 10"/>
    <path d="M465 150H500"/>
    <path d="M495 140l12 10-12 10"/>
    <path d="M695 150H730"/>
    <path d="M725 140l12 10-12 10"/>
  </g>
  <text x="480" y="270" text-anchor="middle" fill="#52606d" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="700">コードは「値を用意する → 処理する → 結果を使う」の順番で読む</text>
</svg>
