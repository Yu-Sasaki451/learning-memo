<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="430" viewBox="0 0 1040 430" role="img" aria-labelledby="title desc">
  <title id="title">React stateの流れ</title>
  <desc id="desc">useStateで値と更新関数を受け取り、イベントで更新して再描画する流れ</desc>
  <rect width="1040" height="430" fill="#f8fafc"/>
  <g fill="#ffffff" stroke="#9fb3c8" stroke-width="2">
    <rect x="55" y="80" width="210" height="120" rx="8"/>
    <rect x="315" y="80" width="210" height="120" rx="8"/>
    <rect x="575" y="80" width="210" height="120" rx="8"/>
    <rect x="315" y="260" width="210" height="120" rx="8"/>
    <rect x="575" y="260" width="210" height="120" rx="8"/>
  </g>
  <g fill="#102a43" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="160" y="120" text-anchor="middle" font-size="20" font-weight="800">useState('')</text>
    <text x="160" y="154" text-anchor="middle" font-size="15">最初の値を渡す</text>
    <text x="420" y="120" text-anchor="middle" font-size="20" font-weight="800">title</text>
    <text x="420" y="154" text-anchor="middle" font-size="15">今の値</text>
    <text x="680" y="120" text-anchor="middle" font-size="20" font-weight="800">setTitle</text>
    <text x="680" y="154" text-anchor="middle" font-size="15">値を変える関数</text>
    <text x="420" y="300" text-anchor="middle" font-size="20" font-weight="800">onChange</text>
    <text x="420" y="334" text-anchor="middle" font-size="15">入力された時に動く</text>
    <text x="680" y="300" text-anchor="middle" font-size="20" font-weight="800">再描画</text>
    <text x="680" y="334" text-anchor="middle" font-size="15">新しい値で画面を作る</text>
  </g>
  <g stroke="#2f9e44" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M270 140H310"/><path d="M305 130l12 10-12 10"/>
    <path d="M530 140H570"/><path d="M565 130l12 10-12 10"/>
    <path d="M680 205V255"/><path d="M670 250l10 12 10-12"/>
    <path d="M575 320H530"/><path d="M535 310l-12 10 12 10"/>
    <path d="M420 255V205"/><path d="M410 210l10-12 10 12"/>
  </g>
  <text x="520" y="410" text-anchor="middle" fill="#52606d" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="700">入力イベントでsetTitleを呼ぶと、Reactが次の描画でtitleを新しい値にする</text>
</svg>
