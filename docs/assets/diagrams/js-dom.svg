<svg xmlns="http://www.w3.org/2000/svg" width="960" height="320" viewBox="0 0 960 320" role="img" aria-labelledby="title desc">
  <title id="title">DOM操作の流れ</title>
  <desc id="desc">HTML要素を取得し、イベントを登録し、表示を変える流れ</desc>
  <rect width="960" height="320" fill="#f8fafc"/>
  <g fill="#ffffff" stroke="#9fb3c8" stroke-width="2">
    <rect x="55" y="92" width="190" height="122" rx="8"/>
    <rect x="285" y="92" width="190" height="122" rx="8"/>
    <rect x="515" y="92" width="190" height="122" rx="8"/>
    <rect x="745" y="92" width="160" height="122" rx="8"/>
  </g>
  <g fill="#102a43" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="150" y="130" text-anchor="middle" font-size="20" font-weight="800">HTML</text>
    <text x="150" y="164" text-anchor="middle" font-size="15">ボタン・入力欄</text>
    <text x="380" y="130" text-anchor="middle" font-size="20" font-weight="800">取得</text>
    <text x="380" y="164" text-anchor="middle" font-size="15">querySelector</text>
    <text x="610" y="130" text-anchor="middle" font-size="20" font-weight="800">反応</text>
    <text x="610" y="164" text-anchor="middle" font-size="15">addEventListener</text>
    <text x="825" y="130" text-anchor="middle" font-size="20" font-weight="800">変更</text>
    <text x="825" y="164" text-anchor="middle" font-size="15">textContent</text>
  </g>
  <g stroke="#2f9e44" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M250 153H280"/>
    <path d="M275 143l12 10-12 10"/>
    <path d="M480 153H510"/>
    <path d="M505 143l12 10-12 10"/>
    <path d="M710 153H740"/>
    <path d="M735 143l12 10-12 10"/>
  </g>
  <text x="480" y="270" text-anchor="middle" fill="#52606d" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="700">DOM操作は「取る → 待つ → 変える」の順番で読む</text>
</svg>
