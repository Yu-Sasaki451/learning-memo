<svg xmlns="http://www.w3.org/2000/svg" width="960" height="330" viewBox="0 0 960 330" role="img" aria-labelledby="title desc">
  <title id="title">ReactとTypeScript</title>
  <desc id="desc">props、state、event、API responseに型を付ける流れ</desc>
  <rect width="960" height="330" fill="#f8fafc"/>
  <g fill="#ffffff" stroke="#9fb3c8" stroke-width="2">
    <rect x="55" y="92" width="185" height="130" rx="8"/>
    <rect x="285" y="92" width="185" height="130" rx="8"/>
    <rect x="515" y="92" width="185" height="130" rx="8"/>
    <rect x="745" y="92" width="160" height="130" rx="8"/>
  </g>
  <g fill="#102a43" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="147" y="130" text-anchor="middle" font-size="20" font-weight="800">props</text>
    <text x="147" y="165" text-anchor="middle" font-size="15">親から来る値</text>
    <text x="377" y="130" text-anchor="middle" font-size="20" font-weight="800">state</text>
    <text x="377" y="165" text-anchor="middle" font-size="15">画面内の値</text>
    <text x="607" y="130" text-anchor="middle" font-size="20" font-weight="800">event</text>
    <text x="607" y="165" text-anchor="middle" font-size="15">入力やクリック</text>
    <text x="825" y="130" text-anchor="middle" font-size="20" font-weight="800">API</text>
    <text x="825" y="165" text-anchor="middle" font-size="15">返却データ</text>
  </g>
  <text x="480" y="275" text-anchor="middle" fill="#52606d" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="700">Reactでは「外から来る値」「画面の値」「イベント」「API結果」に型を付ける</text>
</svg>
