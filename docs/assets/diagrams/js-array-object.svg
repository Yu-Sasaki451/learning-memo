<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">配列とオブジェクトの違い</title>
  <desc id="desc">配列は順番で並ぶ箱、オブジェクトは名前付きの箱</desc>
  <rect width="960" height="360" fill="#f8fafc"/>
  <text x="230" y="55" text-anchor="middle" fill="#102a43" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="800">配列</text>
  <text x="710" y="55" text-anchor="middle" fill="#102a43" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="800">オブジェクト</text>
  <g fill="#ffffff" stroke="#9fb3c8" stroke-width="2">
    <rect x="70" y="100" width="100" height="90" rx="8"/>
    <rect x="190" y="100" width="100" height="90" rx="8"/>
    <rect x="310" y="100" width="100" height="90" rx="8"/>
    <rect x="560" y="90" width="300" height="160" rx="8"/>
  </g>
  <g fill="#102a43" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="120" y="132" text-anchor="middle" font-size="16" font-weight="800">0</text>
    <text x="120" y="164" text-anchor="middle" font-size="17">買い物</text>
    <text x="240" y="132" text-anchor="middle" font-size="16" font-weight="800">1</text>
    <text x="240" y="164" text-anchor="middle" font-size="17">勉強</text>
    <text x="360" y="132" text-anchor="middle" font-size="16" font-weight="800">2</text>
    <text x="360" y="164" text-anchor="middle" font-size="17">掃除</text>
    <text x="600" y="130" font-size="17" font-weight="800">id</text>
    <text x="710" y="130" font-size="17">1</text>
    <text x="600" y="170" font-size="17" font-weight="800">title</text>
    <text x="710" y="170" font-size="17">JavaScriptを勉強</text>
    <text x="600" y="210" font-size="17" font-weight="800">isDone</text>
    <text x="710" y="210" font-size="17">false</text>
  </g>
  <g fill="#52606d" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="700">
    <text x="230" y="285" text-anchor="middle">順番で取る: todos[0]</text>
    <text x="710" y="285" text-anchor="middle">名前で取る: todo.title</text>
  </g>
</svg>
