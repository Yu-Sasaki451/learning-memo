<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="420" viewBox="0 0 1040 420" role="img" aria-labelledby="title desc">
  <title id="title">コードの記号の見方</title>
  <desc id="desc">配列、オブジェクト、関数、HTMLタグ、型、PHPの記号をまとめた図</desc>
  <rect width="1040" height="420" fill="#f8fafc"/>
  <g fill="#ffffff" stroke="#9fb3c8" stroke-width="2">
    <rect x="55" y="70" width="280" height="95" rx="8"/>
    <rect x="380" y="70" width="280" height="95" rx="8"/>
    <rect x="705" y="70" width="280" height="95" rx="8"/>
    <rect x="55" y="210" width="280" height="95" rx="8"/>
    <rect x="380" y="210" width="280" height="95" rx="8"/>
    <rect x="705" y="210" width="280" height="95" rx="8"/>
  </g>
  <g fill="#102a43" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="195" y="108" text-anchor="middle" font-size="22" font-weight="800">[]</text>
    <text x="195" y="137" text-anchor="middle" font-size="15">配列。複数の値を順番に入れる</text>
    <text x="520" y="108" text-anchor="middle" font-size="22" font-weight="800">{}</text>
    <text x="520" y="137" text-anchor="middle" font-size="15">オブジェクトや処理のまとまり</text>
    <text x="845" y="108" text-anchor="middle" font-size="22" font-weight="800">()</text>
    <text x="845" y="137" text-anchor="middle" font-size="15">関数に渡す値や条件を書く</text>
    <text x="195" y="248" text-anchor="middle" font-size="22" font-weight="800">&lt;Button /&gt;</text>
    <text x="195" y="277" text-anchor="middle" font-size="15">Reactの部品を書く形</text>
    <text x="520" y="248" text-anchor="middle" font-size="22" font-weight="800">: string</text>
    <text x="520" y="277" text-anchor="middle" font-size="15">TypeScriptの型を書く形</text>
    <text x="845" y="248" text-anchor="middle" font-size="22" font-weight="800">-&gt; / ::</text>
    <text x="845" y="277" text-anchor="middle" font-size="15">Laravel/PHPで処理を呼ぶ形</text>
  </g>
  <text x="520" y="365" text-anchor="middle" fill="#52606d" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="700">最初は意味より先に「どの記号が、どこからどこまでを囲っているか」を見る</text>
</svg>
