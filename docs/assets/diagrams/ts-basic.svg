<svg xmlns="http://www.w3.org/2000/svg" width="960" height="330" viewBox="0 0 960 330" role="img" aria-labelledby="title desc">
  <title id="title">TypeScriptの流れ</title>
  <desc id="desc">JavaScriptに型を書き、TypeScriptが確認し、JavaScriptとして実行する流れ</desc>
  <rect width="960" height="330" fill="#f8fafc"/>
  <g fill="#ffffff" stroke="#9fb3c8" stroke-width="2">
    <rect x="55" y="92" width="185" height="125" rx="8"/>
    <rect x="300" y="92" width="160" height="125" rx="8"/>
    <rect x="520" y="92" width="160" height="125" rx="8"/>
    <rect x="740" y="92" width="165" height="125" rx="8"/>
  </g>
  <g fill="#102a43" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="147" y="133" text-anchor="middle" font-size="20" font-weight="800">JavaScript</text>
    <text x="147" y="168" text-anchor="middle" font-size="15">いつものコード</text>
    <text x="380" y="133" text-anchor="middle" font-size="20" font-weight="800">型を書く</text>
    <text x="380" y="168" text-anchor="middle" font-size="15">string / number</text>
    <text x="600" y="133" text-anchor="middle" font-size="20" font-weight="800">型チェック</text>
    <text x="600" y="168" text-anchor="middle" font-size="15">実行前に確認</text>
    <text x="822" y="133" text-anchor="middle" font-size="20" font-weight="800">実行</text>
    <text x="822" y="168" text-anchor="middle" font-size="15">JSとして動く</text>
  </g>
  <g stroke="#2f9e44" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M245 158H295"/>
    <path d="M290 148l12 10-12 10"/>
    <path d="M465 158H515"/>
    <path d="M510 148l12 10-12 10"/>
    <path d="M685 158H735"/>
    <path d="M730 148l12 10-12 10"/>
  </g>
  <text x="480" y="276" text-anchor="middle" fill="#52606d" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="700">TypeScriptは、実行前に「この値の使い方で大丈夫か」を確認する道具</text>
</svg>
